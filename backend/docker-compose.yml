version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sgm_postgres
    environment:
      POSTGRES_USER: sgm_admin
      POSTGRES_PASSWORD: sgm_secret
      POSTGRES_DB: sgm_hadir
      TZ: Asia/Jakarta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sgm_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
